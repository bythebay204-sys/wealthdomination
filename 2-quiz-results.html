<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Wealth Score Results | WealthPath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:   #0b0f1a;
    --bg-mid:    #111827;
    --bg-card:   #1a2236;
    --gold:      #C9A84C;
    --gold-lt:   #e2c16d;
    --white:     #f0f4ff;
    --muted:     #8a96b0;
    --border:    rgba(201,168,76,0.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg-deep);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: rgba(11,15,26,0.96);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 10;
  }
  .logo-lockup { display: flex; align-items: center; gap: 14px; text-decoration: none; }
  .logo-img { height: 52px; width: auto; display: block; }
  .logo-text-col { display: flex; flex-direction: column; line-height: 1; }
  .logo-wordmark { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 4px; color: var(--gold); }
  .logo-byline { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-top: 5px; }
  .header-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }

  /* ── LAYOUT ── */
  main { flex: 1; max-width: 720px; margin: 0 auto; padding: 72px 24px 100px; width: 100%; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fillBar { from { width: 0; } to { width: var(--target-width); } }
  @keyframes countUp { from { opacity:0; transform:scale(.8); } to { opacity:1; transform:scale(1); } }
  .fade1 { animation: fadeUp .55s ease both; }
  .fade2 { animation: fadeUp .55s .15s ease both; }
  .fade3 { animation: fadeUp .55s .3s ease both; }
  .fade4 { animation: fadeUp .55s .45s ease both; }
  .fade5 { animation: fadeUp .55s .6s ease both; }

  /* ── SCORE RING ── */
  .score-section { text-align: center; margin-bottom: 56px; }
  .score-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
  .score-ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .score-ring { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: rgba(201,168,76,0.12); stroke-width: 8; }
  .score-ring-fill { fill: none; stroke: var(--gold); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 408; stroke-dashoffset: 408; transition: stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1); }
  .score-ring-fill.animated { stroke-dashoffset: var(--dash-offset); }
  .score-num { position: absolute; font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 2px; color: var(--white); line-height: 1; }
  .score-num sup { font-size: 28px; vertical-align: super; color: var(--gold); }
  .tier-badge { display: inline-block; background: rgba(201,168,76,0.1); border: 1px solid var(--gold); color: var(--gold); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; padding: 8px 24px; }
  .score-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 5vw, 42px); letter-spacing: 2px; margin-top: 16px; }

  /* ── DIVIDER ── */
  .gold-rule { border: none; border-top: 1px solid var(--border); margin: 48px 0; }

  /* ── ANALYSIS ── */
  .section-heading { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }
  .bars-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 48px; }
  .bar-row { display: flex; flex-direction: column; gap: 8px; }
  .bar-meta { display: flex; justify-content: space-between; align-items: baseline; }
  .bar-label { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--white); }
  .bar-pct { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--gold); }
  .bar-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-lt)); border-radius: 2px; width: 0; transition: width 1.4s cubic-bezier(.4,0,.2,1); }

  /* ── INSIGHT CARD ── */
  .insight-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 36px 40px;
    margin-bottom: 48px;
  }
  .insight-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--gold); margin-bottom: 14px; }
  .insight-card p { font-size: 16px; line-height: 1.75; color: var(--white); opacity: .88; }

  /* ── OFFER BLOCK ── */
  .offer-block {
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(26,34,54,0.6) 100%);
    border: 1px solid var(--border);
    padding: 48px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .offer-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .offer-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
  .offer-block h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 6vw, 52px); letter-spacing: 2px; line-height: 1.05; margin-bottom: 20px; }
  .offer-block h2 em { color: var(--gold); font-style: normal; }
  .offer-block p { font-size: 16px; line-height: 1.75; color: var(--white); opacity: .82; max-width: 520px; margin: 0 auto 36px; }
  .offer-price { margin-bottom: 32px; }
  .offer-price .was { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: line-through; margin-bottom: 6px; }
  .offer-price .now { font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: var(--gold); line-height: 1; letter-spacing: 2px; }
  .offer-price .now sup { font-size: 28px; vertical-align: super; }
  .btn-cta {
    display: inline-block;
    background: var(--gold);
    color: var(--bg-deep);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    padding: 20px 56px;
    text-decoration: none;
    transition: background .2s, transform .15s;
    border: none;
    cursor: pointer;
    width: 100%;
    max-width: 440px;
  }
  .btn-cta:hover { background: var(--gold-lt); transform: translateY(-2px); }
  .offer-guarantee { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 20px; }
  .offer-bullets { list-style: none; text-align: left; max-width: 400px; margin: 0 auto 36px; display: flex; flex-direction: column; gap: 12px; }
  .offer-bullets li { font-size: 15px; color: var(--white); opacity: .85; padding-left: 22px; position: relative; line-height: 1.5; }
  .offer-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--gold); }

  /* ── FOOTER ── */
  footer { border-top: 1px solid var(--border); padding: 28px 48px; text-align: center; }
  footer p { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 14px 20px; }
    .logo-img { height: 44px; }
    .logo-wordmark { font-size: 26px; }
    .header-label { display: none; }
    main { padding: 48px 16px 72px; }
    .insight-card { padding: 28px 24px; }
    .offer-block { padding: 40px 24px; }
    .btn-cta { font-size: 18px; padding: 18px 32px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo-lockup" href="#">
    <img class="logo-img" src="wealthpath-logo.svg" alt="WealthPath">
    <div class="logo-text-col">
      <span class="logo-wordmark">WealthPath</span>
      <span class="logo-byline">by J.C. Winthrop</span>
    </div>
  </a>
  <span class="header-label">Your Results</span>
</header>

<main>

  <!-- SCORE -->
  <section class="score-section fade1">
    <p class="score-label">Your Wealth Score</p>
    <div class="score-ring-wrap">
      <svg class="score-ring" width="160" height="160" viewBox="0 0 160 160">
        <circle class="score-ring-bg" cx="80" cy="80" r="65"/>
        <circle class="score-ring-fill" id="ringFill" cx="80" cy="80" r="65"/>
      </svg>
      <div class="score-num"><span id="scoreDisplay">0</span><sup>%</sup></div>
    </div>
    <div class="tier-badge" id="tierBadge">Loading…</div>
    <h1 class="score-name" id="scoreName"></h1>
  </section>

  <hr class="gold-rule fade2">

  <!-- ANALYSIS BARS -->
  <section class="fade3">
    <p class="section-heading">Breakdown by Pillar</p>
    <div class="bars-grid" id="barsGrid"></div>
  </section>

  <!-- INSIGHT -->
  <div class="insight-card fade4" id="insightCard">
    <h3 id="insightTitle"></h3>
    <p id="insightBody"></p>
  </div>

  <!-- OFFER -->
  <div class="offer-block fade5" id="offerBlock">
    <p class="offer-eyebrow">Your Next Step</p>
    <h2 id="offerHeading"></h2>
    <p id="offerCopy"></p>
    <ul class="offer-bullets" id="offerBullets"></ul>
    <div class="offer-price">
      <p class="was">Value: $97</p>
      <p class="now"><sup>$</sup><span id="offerPriceDisplay">24</span><sup style="font-size:24px;vertical-align:super">.99</sup></p>
    </div>
    <a class="btn-cta" id="offerCta" href="#">Claim Your WealthPath Workbook →</a>
    <p class="offer-guarantee">30-Day Money-Back Guarantee &nbsp;·&nbsp; Instant Digital Access</p>
  </div>

</main>

<footer>
  <p>© 2025 DMT International LLC &nbsp;·&nbsp; All Rights Reserved</p>
</footer>

<script>
// ── PARSE PARAMS ─────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const rawScore = parseInt(params.get('score') || '0', 10);
const score    = Math.min(100, Math.max(0, rawScore));
const name     = params.get('name') || '';

// ── TIER CONFIG ───────────────────────────────────────────────
const tiers = [
  {
    min: 0, max: 39,
    badge: 'Tier 1: Foundation',
    name: 'Your Wealth Foundation Needs Work',
    insight: {
      title: 'The Hard Truth',
      body: 'Your score reveals significant gaps across the core wealth-building pillars. The good news: every high earner and self-made investor started exactly where you are. The WealthPath Workbook was built for this stage — it maps out the exact sequence to fix the foundation first.'
    },
    bars: [18, 12, 22, 10, 15],
    offer: {
      heading: 'Get The Exact Roadmap <em>Built for Where You Are Now</em>',
      copy: 'The WealthPath Wealth Audit Workbook gives you a step-by-step blueprint to rebuild from the ground up — budgeting, debt elimination, income expansion, and your first real asset.',
      bullets: ['Gap-by-gap action plan across all 5 wealth pillars', 'The debt paydown sequence that frees up capital fastest', 'Income expansion exercises you can start this week', 'First-asset framework for under $5,000'],
      price: '24.99',
      link: 'https://buy.stripe.com/9B628r5rN79z4s58Zia3u01'
    }
  },
  {
    min: 40, max: 64,
    badge: 'Tier 2: Builder',
    name: 'You Have Momentum — Now Multiply It',
    insight: {
      title: 'What Your Score Is Telling You',
      body: 'You\'ve built real traction. You have some income, some savings, maybe a few assets. But you\'re not compounding yet. The difference between your current trajectory and the life you\'re after is leverage — using what you already have to build exponentially. The WealthPath system shows you exactly how.'
    },
    bars: [48, 42, 55, 38, 60],
    offer: {
      heading: 'Turn Your Momentum Into <em>Compounding Wealth</em>',
      copy: 'The WealthPath Wealth Audit Workbook gives you the leverage framework to turn your existing assets and income into a self-compounding machine.',
      bullets: ['The leverage stack most builders miss entirely', 'Asset acquisition without waiting to "save up"', 'Passive income setup from month one', 'Business credit activation sequence (net-30 to revolving)'],
      price: '24.99',
      link: 'https://buy.stripe.com/9B628r5rN79z4s58Zia3u01'
    }
  },
  {
    min: 65, max: 84,
    badge: 'Tier 3: Operator',
    name: 'You\'re Ahead — Now Protect What You\'ve Built',
    insight: {
      title: 'The Risk Most Operators Miss',
      body: 'Your score puts you solidly in the top tier — more assets, more income, more options than most people ever build. The danger at this stage isn\'t growth. It\'s exposure. Tax drag, legal vulnerabilities, and unprotected assets are the silent destroyers of operator-level wealth. The Blueprint closes those gaps.'
    },
    bars: [72, 68, 80, 65, 78],
    offer: {
      heading: 'Protect and Scale With <em>The Full Blueprint</em>',
      copy: 'The J.C. Winthrop Blueprint gives operators like you the advanced structure: entity layering, tax optimization, asset protection, and the passive income systems that run without you.',
      bullets: ['Entity and holding structure for asset protection', 'Advanced tax strategies most CPAs don\'t use', 'The passive income model that generates without your time', 'Exit and legacy architecture'],
      price: '57',
      link: 'https://buy.stripe.com/bJeaEXbQbeC1f6Jdfya3u03'
    }
  },
  {
    min: 85, max: 100,
    badge: 'Tier 4: Sovereign',
    name: 'You\'re Operating at Sovereign Level',
    insight: {
      title: 'What Separates the Top 1%',
      body: 'Your score reflects a wealth profile most people never reach. You have assets, structure, and income. What\'s left is the architecture of true independence — legacy-grade protection, multi-entity structures, and the kind of passive systems that grow without your involvement. The Sovereign Blueprint gives you all of it.'
    },
    bars: [88, 90, 85, 92, 87],
    offer: {
      heading: 'The Sovereign Blueprint: <em>Full System Access</em>',
      copy: 'You\'re in rare company. The Billionaire Blueprint by J.C. Winthrop gives you the complete sovereign wealth architecture — entities, tax elimination, passive income, digital assets, and legacy.',
      bullets: ['Complete 8-module Billionaire Blueprint system', 'Sovereign entity + holding structure template', 'Digital asset and crypto wealth framework', 'Full tax elimination roadmap for high earners'],
      price: '97',
      link: 'https://buy.stripe.com/dRm8wPcUf0LbSw96Raa3u02'
    }
  }
];

// ── FIND TIER ─────────────────────────────────────────────────
const tier = tiers.find(t => score >= t.min && score <= t.max) || tiers[0];

// ── PERSONALIZE GREETING ──────────────────────────────────────
if (name) {
  const greeting = document.createElement('p');
  greeting.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;text-align:center;';
  greeting.textContent = name + ', here are your results';
  document.querySelector('.score-section').prepend(greeting);
}

// ── POPULATE UI ───────────────────────────────────────────────
document.getElementById('tierBadge').textContent = tier.badge;
document.getElementById('scoreName').textContent = tier.name;
document.getElementById('insightTitle').textContent = tier.insight.title;
document.getElementById('insightBody').textContent = tier.insight.body;

const offerData = tier.offer;
document.getElementById('offerHeading').innerHTML = offerData.heading;
document.getElementById('offerCopy').textContent   = offerData.copy;
document.getElementById('offerCta').href           = offerData.link;

// price display
const priceDisplay = document.getElementById('offerPriceDisplay');
const priceParts   = offerData.price.split('.');
if (priceParts.length === 2) {
  priceDisplay.textContent = priceParts[0];
  priceDisplay.nextElementSibling.textContent = '.' + priceParts[1];
} else {
  priceDisplay.textContent = offerData.price;
  priceDisplay.nextElementSibling.textContent = '';
}

// bullets
const ul = document.getElementById('offerBullets');
offerData.bullets.forEach(b => {
  const li = document.createElement('li');
  li.textContent = b;
  ul.appendChild(li);
});

// ── BARS ─────────────────────────────────────────────────────
const pillars = ['Income & Cash Flow', 'Assets & Net Worth', 'Credit & Leverage', 'Tax Efficiency', 'Protection & Legacy'];
const barsGrid = document.getElementById('barsGrid');
tier.bars.forEach((pct, i) => {
  const row = document.createElement('div');
  row.className = 'bar-row';
  row.innerHTML = `
    <div class="bar-meta">
      <span class="bar-label">${pillars[i]}</span>
      <span class="bar-pct">${pct}%</span>
    </div>
    <div class="bar-track"><div class="bar-fill" data-pct="${pct}"></div></div>`;
  barsGrid.appendChild(row);
});

// ── ANIMATE ───────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Score count-up
  let start = 0;
  const el = document.getElementById('scoreDisplay');
  const duration = 1500;
  const step = (timestamp) => {
    if (!start) start = timestamp;
    const progress = Math.min((timestamp - start) / duration, 1);
    el.textContent = Math.round(progress * score);
    if (progress < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);

  // Ring fill
  const circumference = 408;
  const dashOffset    = circumference - (circumference * score / 100);
  const ring          = document.getElementById('ringFill');
  ring.style.setProperty('--dash-offset', dashOffset);
  setTimeout(() => { ring.style.strokeDashoffset = dashOffset; }, 100);

  // Bars
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  }, 400);
});
</script>
</body>
</html>
